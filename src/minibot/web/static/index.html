<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minibot · Sci-Fi Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="shell">
      <header class="topbar">
        <h1>MINIBOT // SCI-FI TERMINAL</h1>
        <p>上传文件 + 对话助手（DeepSeek）</p>
      </header>

      <section class="panel upload-panel">
        <h2>文件上传</h2>
        <div class="upload-row">
          <input id="fileInput" type="file" />
          <button id="uploadBtn">上传</button>
        </div>
        <p id="uploadStatus" class="hint">尚未上传文件</p>
      </section>

      <section class="panel chat-panel">
        <h2>聊天窗口</h2>
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-row">
          <textarea
            id="messageInput"
            placeholder="输入你的问题，例如：请根据上传内容总结并生成答案草稿"
          ></textarea>
          <button id="sendBtn">发送</button>
        </div>
      </section>
    </main>

    <script src="/static/main.js"></script>
  </body>
  </html>
